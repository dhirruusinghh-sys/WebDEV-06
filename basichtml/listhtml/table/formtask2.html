<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table border="1" cellpadding="3" cellspacing="0" align="center">
      <tr>
        <th colspan="2">Pizza Order Form</th>
      </tr>
      <tr>
        <td>First Name:</td>
        <td><input type="text" name="first_name" /></td>
      </tr>
      <tr>
        <td>Last Name:</td>
        <td><input type="text" name="last_name" /></td>
      </tr>
      <tr>
        <td>Email address:</td>
        <td><input type="email" name="email" /></td>
      </tr>
      <tr>
        <td>Contact Number:</td>
        <td><input type="number" name="number"</td>
      </tr>
      <tr>
        <td>Preferred Delivery Date:</td>
        <td><input type="datetime-local" name="date"</td>
      </tr>
      
        <td>Size:</td>
        <tr>
            <td><input type="radio" name="size" value="small">Small</td>
            <td><input type="radio" name="size" value="medium">Medium</td>
            <td><input type="radio" name="size" value="large">Large</td>
        </tr>

        <td>Flavor:</td>
        <tr>
            <td><input type="checkbox" name="flavor" value="hawaiian"> Hawaiian</td>
            <td><input type="checkbox" name="flavor" value="pepperonri"> Pepperoni</td>
            <td><input type="checkbox" name="flavor" value="vegetable">Vegetable</td>
        </tr>
        <tr>
            <td>Credit Card Number:</td>
            <td><input type="text" name="credit_card" /></td>
        </tr>
        <tr>
            <td>Pin:</td>
            <td><input type="password" name="pin" /></td>
        </tr>
        
            <td>Additional Notes:</td>
            <td><textarea name="notes"></textarea></td>
        <tr>
            <tr>
                
                <td><button type="submit">Submit Order</button></td>
            </tr>
        </tr>
    </form>
  </body>
</html>
