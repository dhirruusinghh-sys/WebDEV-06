<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login-Register</title>
  <link rel="stylesheet" href="csspractice.css" />
</head>

<body>

<div id="main">
  <div class="card" id="login">
    <h1>Login</h1>

    <div class="form-field">
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope" viewBox="0 0 16 16">
          <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1z"/>
        </svg>
      </span>
      <input type="email" placeholder="Email" />
    </div>

    <div class="form-field">
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-file-lock2" viewBox="0 0 16 16">
          <path d="M8 5a1 1 0 0 1 1 1v1H7V6a1 1 0 0 1 1-1"/>
        </svg>
      </span>
      <input type="password" placeholder="Password" />
    </div>

    <div class="terms">
      <div>
        <input type="checkbox" name="rememberMe" id="rememberMe" />
        <span>Remember me</span>
      </div>
      <a href="#">Forgot password?</a>
    </div>

    <div class="SubmitButton">
      <button id="loginNow">Login Now</button>
    </div>

    <div class="referenceLink">
      <p>Don't have an account? <a href="#">Register here</a></p>
    </div>

  </div>



  <div class="card" id="register">

    <h1>Register</h1>

    <div class="form-field">
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
        </svg>
      </span>
      <input type="text" placeholder="Enter Your Name" />
    </div>

    <div class="form-field">
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-envelope" viewBox="0 0 16 16">
          <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8"/>
        </svg>
      </span>
      <input type="email" placeholder="Enter Your Email" />
    </div>

    <div class="form-field">
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-file-lock2" viewBox="0 0 16 16">
          <path d="M8 5a1 1 0 0 1 1 1v1H7V6"/>
        </svg>
      </span>
      <input type="password" placeholder="Create Your Password" />
    </div>

    <div class="form-field">
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-file-lock2" viewBox="0 0 16 16">
          <path d="M8 5a1 1 0 0 1 1 1v1H7V6"/>
        </svg>
      </span>
      <input type="password" placeholder="Confirm Your Password" />
    </div>

    <div class="terms">
      <div>
        <input type="checkbox" name="rememberMe" />
        <span>I accept all terms & conditions</span>
      </div>
    </div>

    <div class="SubmitButton">
      <button id="registerNow">Register Now</button>
    </div>

    <div class="referenceLink">
      <p>Already have an account? <a href="#">Login here</a></p>
    </div>

  </div>

</div>

</body>
</html>
